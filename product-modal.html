<!-- Add this to your HTML before the closing body tag -->

<!-- Product Modal -->
<div id="productModal" class="product-modal hidden">
  <div class="product-modal__overlay"></div>
  <div class="product-modal__content">
    <button id="modalClose" class="modal-close" aria-label="Close product details">×</button>
    <div class="product-modal__grid">
      <div class="product-modal__image">
        <img id="modalImage" src="" alt="Product image" />
      </div>
      <div class="product-modal__info">
        <h2 id="modalProductName"></h2>
        <p id="modalProductDescription"></p>
        <div class="product-modal__price" id="modalProductPrice"></div>
        <div class="product-modal__actions">
          <button id="modalWhatsappBtn" class="button button--primary">Order via WhatsApp</button>
          <button id="modalAddCartBtn" class="button button--ghost">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.product-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.product-modal:not(.hidden) {
  opacity: 1;
  pointer-events: auto;
}

.product-modal__overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(17, 17, 17, 0.6);
  backdrop-filter: blur(4px);
}

.product-modal__content {
  position: relative;
  z-index: 1;
  background: var(--surface-strong);
  border-radius: var(--radius);
  max-width: 600px;
  width: 90%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 40px 80px rgba(17, 17, 17, 0.3);
}

.modal-close {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  background: rgba(17, 17, 17, 0.08);
  border: none;
  border-radius: 50%;
  width: 2.5rem;
  height: 2.5rem;
  font-size: 1.8rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transition: background 0.2s ease;
}

.modal-close:hover {
  background: rgba(17, 17, 17, 0.15);
}

.product-modal__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  padding: 2rem;
}

.product-modal__image img {
  width: 100%;
  border-radius: var(--radius-sm);
}

.product-modal__info h2 {
  font-size: 1.8rem;
  margin: 0 0 0.8rem;
  font-family: 'Playfair Display', serif;
}

.product-modal__info p {
  color: var(--muted);
  line-height: 1.6;
  margin: 0 0 1.5rem;
}

.product-modal__price {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 2rem;
}

.product-modal__actions {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

@media (max-width: 640px) {
  .product-modal__grid {
    grid-template-columns: 1fr;
    gap: 1rem;
    padding: 1.5rem;
  }
  
  .modal-close {
    top: 1rem;
    right: 1rem;
  }
}
</style>
